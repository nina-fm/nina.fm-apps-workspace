name: Docker Cleanup

# Deux usages :
# - workflow_call (depuis deploy.yml) : nettoyage ciblé post-deploy sur une image donnée
# - schedule / workflow_dispatch     : nettoyage profond global (toutes images + build cache)
#
# Secrets requis sur ce repo : SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY

on:
  schedule:
    - cron: '0 2 * * 0' # Chaque dimanche à 2h UTC
  workflow_dispatch:
  workflow_call:
    inputs:
      image-name:
        description: 'Image complète à cibler (ex: ghcr.io/org/repo). Absent = deep cleanup.'
        type: string
        required: false
        default: ''

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Docker cleanup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -n "${{ inputs.image-name }}" ]; then
              echo "🧹 Nettoyage post-deploy pour ${{ inputs.image-name }}..."
              docker image prune -f --filter "dangling=true"
              docker images "${{ inputs.image-name }}" --format "{{.ID}}" | tail -n +4 | xargs -r docker rmi -f || true
            else
              echo "🧹 Nettoyage Docker profond..."
              docker image prune -af
              docker builder prune -af
            fi
            echo "✅ Nettoyage terminé"
            docker system df
