name: Docker Cleanup

# Nettoyage profond hebdomadaire : images inutilisées + build cache.
# Secrets requis sur ce repo : SERVER_HOST, SERVER_USER, SSH_PRIVATE_KEY.

on:
  schedule:
    - cron: '0 2 * * 0' # Chaque dimanche à 2h UTC
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Deep Docker cleanup on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "🧹 Nettoyage Docker profond..."

            # Images inutilisées (sans --volumes pour ne pas toucher les données)
            docker image prune -af

            # Cache de build Docker
            docker builder prune -af

            echo "✅ Nettoyage terminé"
            docker system df
