name: Node Validate

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        type: string
        default: '22'
      type-check:
        description: 'Run TypeScript type check'
        type: boolean
        default: true
      lint-strict:
        description: 'Run lint:strict instead of lint'
        type: boolean
        default: false
      codecov-enabled:
        description: 'Upload coverage to Codecov'
        type: boolean
        default: false
      lcov-path:
        description: 'Path to the LCOV coverage file'
        type: string
        default: './coverage/lcov.info'
      upload-on-branch:
        description: 'Only upload coverage on this branch'
        type: string
        default: 'main'
      grafana-metrics-enabled:
        description: 'Push coverage trend to Grafana Cloud'
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false
      GRAFANA_METRICS_URL:
        required: false
      GRAFANA_METRICS_USER:
        required: false
      GRAFANA_METRICS_TOKEN:
        required: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type-check
        if: inputs.type-check
        run: pnpm type-check

      - name: Run lint
        if: inputs.lint-strict == false
        run: pnpm lint

      - name: Run lint:strict
        if: inputs.lint-strict
        run: pnpm lint:strict

      - name: Run tests
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        if: inputs.codecov-enabled && github.ref == format('refs/heads/{0}', inputs.upload-on-branch)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ inputs.lcov-path }}
          fail_ci_if_error: false

      - name: Push coverage trend to Grafana
        if: inputs.grafana-metrics-enabled && github.ref == format('refs/heads/{0}', inputs.upload-on-branch)
        env:
          GRAFANA_METRICS_URL: ${{ secrets.GRAFANA_METRICS_URL }}
          GRAFANA_METRICS_USER: ${{ secrets.GRAFANA_METRICS_USER }}
          GRAFANA_METRICS_TOKEN: ${{ secrets.GRAFANA_METRICS_TOKEN }}
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')
          curl -sf -u "${GRAFANA_METRICS_USER}:${GRAFANA_METRICS_TOKEN}" \
            -X POST "${GRAFANA_METRICS_URL}" \
            -H "Content-Type: text/plain" \
            --data-binary "test_coverage,app=${{ github.event.repository.name }} value=${COVERAGE}" \
            || echo "Grafana metrics push failed (non-blocking)"
