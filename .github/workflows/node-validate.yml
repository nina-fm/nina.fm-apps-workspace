name: Node Validate

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        type: string
        default: '22'
      type-check:
        description: 'Run TypeScript type check'
        type: boolean
        default: true
      lint-strict:
        description: 'Run lint:strict instead of lint'
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      HUSKY: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type-check
        if: inputs.type-check
        run: pnpm type-check

      - name: Run lint
        if: inputs.lint-strict == false
        run: pnpm lint

      - name: Run lint:strict
        if: inputs.lint-strict
        run: pnpm lint:strict

      - name: Run tests
        run: pnpm test:coverage
